# User environment — core runtime + viz extras.
# Corresponds to pyproject.toml [project.dependencies] + [project.optional-dependencies.viz]
#
# Create:  conda env create -f environment.yml
# Update:  conda env update -f environment.yml --prune
name: pydsm
channels:
  - conda-forge
  - cadwr-dms
  - nodefaults
dependencies:
  - python>=3.10,<3.14
  - pip
  # --- core runtime (mirrors pyproject.toml [project.dependencies]) ---
  - click
  - networkx
  - h5py
  - pandas
  - numpy
  - numba
  - diskcache
  - tabulate
  # --- viz extras (pyproject.toml [project.optional-dependencies.viz]) ---
  - geopandas
  - shapely
  # --- conda-only / custom-channel packages ---
  - pyhecdss
  - vtools3
  - pip:
      - -e .        # installs pydsm itself in editable mode
