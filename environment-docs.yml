# Full environment — core runtime + viz + test + docs extras.
# Use for documentation builds, notebook execution, and CI.
# Corresponds to pyproject.toml [project.dependencies]
#   + [project.optional-dependencies.viz]
#   + [project.optional-dependencies.test]
#   + [project.optional-dependencies.docs]
#
# Create:  conda env create -f environment-docs.yml
# Update:  conda env update -f environment-docs.yml --prune
name: pydsm-docs
channels:
  - conda-forge
  - cadwr-dms
  - nodefaults
dependencies:
  - python=3.11
  - pip
  # --- core runtime (mirrors pyproject.toml [project.dependencies]) ---
  - click
  - networkx
  - h5py
  - pandas
  - numpy
  - numba
  - diskcache
  - tabulate
  - pyhecdss
  - vtools3
  # --- viz extras (pyproject.toml [project.optional-dependencies.viz]) ---
  - geopandas
  - shapely
  # --- test extras (pyproject.toml [project.optional-dependencies.test]) ---
  - pytest>=7
  - pytest-cov
  - pyarrow
  # --- docs extras (pyproject.toml [project.optional-dependencies.docs]) ---
  - sphinx
  - nbsphinx
  - sphinx-rtd-theme
  - sphinx-autobuild
  - jupyter
  - nbconvert
  - pandoc
  - ipykernel
  - pip:
      - .           # installs pydsm (non-editable) for docs build
