# Developer environment — core runtime + viz + test extras.
# Corresponds to pyproject.toml [project.dependencies]
#   + [project.optional-dependencies.viz]
#   + [project.optional-dependencies.test]
#
# Create:  conda env create -f environment_dev.yml
# Update:  conda env update -f environment_dev.yml --prune
name: pydsm-dev
channels:
  - conda-forge
  - cadwr-dms
  - nodefaults
dependencies:
  - python>=3.10,<3.14
  - pip
  # --- core runtime (mirrors pyproject.toml [project.dependencies]) ---
  - click
  - networkx
  - h5py
  - pandas
  - numpy
  - numba
  - diskcache
  - tabulate
  - pyhecdss
  - vtools3
  # --- viz extras (pyproject.toml [project.optional-dependencies.viz]) ---
  - geopandas
  - shapely
  - hvplot
  - panel
  - param
  # --- test extras (pyproject.toml [project.optional-dependencies.test]) ---
  - pytest>=7
  - pytest-cov
  - pyarrow
  # --- code quality ---
  - black
  - flake8
  - pip:
      - -e .        # installs pydsm itself in editable mode
